    rd.readAsText(f, 'utf-8');
  }
  });
}

/** CSV con comillas, saltos dentro de campo y separador , o ; (SharePoint usa ambos). */
function parseCsv(text) {
  text = text.replace(/^﻿/, '');
  const head = text.slice(0, text.indexOf('\n'));
  const sep = (head.match(/;/g) || []).length > (head.match(/,/g) || []).length ? ';' : ',';
  const rows = [];
  let row = [], cell = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else q = false; }
      else cell += c;
    } else if (c === '"') q = true;
    else if (c === sep) { row.push(cell); cell = ''; }
    else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
    else if (c !== '\r') cell += c;
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  if (rows.length < 2) throw new Error('No encuentro cabecera y datos.');
  const headers = rows[0].map((h) => h.trim());
  return rows.slice(1).filter((r) => r.some((c) => c.trim()))
    .map((r) => Object.fromEntries(headers.map((h, i) => [h, (r[i] ?? '').trim()])));
}

// ─── Estadística ────────────────────────────────────────────────────────
/** Curso académico español: de septiembre a agosto. 2025-09 → "2025-26". */
function cursoDe(v) {
  const d = v instanceof Date ? v : new Date(v);
  if (isNaN(d)) return null;
  const y = d.getFullYear();
  return d.getMonth() >= 8 ? `${y}-${String(y + 1).slice(2)}` : `${y - 1}-${String(y).slice(2)}`;
}

/* Agrupa ignorando tildes y mayúsculas. El maestro tiene "Transformación Digital"
   y "Transformacion Digital" como si fueran áreas distintas: sin esto, los KPIs
   se parten en dos. No corrige el Excel — solo evita que la errata contamine. */
const canon = (v) => normName(v || '').trim();

/** Variantes que solo se diferencian en tildes/mayúsculas. Para avisar, no para callar. */
function variantes(records, campo) {
  const m = new Map();
  records.forEach((r) => {
    const v = (r[campo] || '').trim();
    if (!v) return;
    const c = canon(v);
    if (!m.has(c)) m.set(c, new Set());
    m.get(c).add(v);
  });
  return [...m.values()].filter((s) => s.size > 1).map((s) => [...s]);
}

const N_MIN = 8;  // por debajo de esto una correlación es ruido, no un hallazgo

const mean = (rows, fs) => {
  const v = rows.flatMap((r) => fs.map((f) => parseFloat(r[f])).filter((x) => !isNaN(x)));
  return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
};
const rowMean = (r, fs) => {
  const v = fs.map((f) => parseFloat(r[f])).filter((x) => !isNaN(x));
  return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
};
const nps = (rows, f) => {
  const v = rows.map((r) => parseInt(r[f], 10)).filter((x) => !isNaN(x));
  if (!v.length) return null;
  return Math.round(((v.filter((x) => x >= 9).length - v.filter((x) => x <= 6).length) / v.length) * 100);
};
const share = (rows, f, want) => rows.length
  ? Math.round((rows.filter((r) => want.includes(r[f])).length / rows.length) * 100) : null;

/** Pearson. Devuelve null por debajo de N_MIN: mejor nada que un hallazgo falso. */
function pearson(pairs) {
  const n = pairs.length;
  if (n < N_MIN) return null;
  const mx = pairs.reduce((a, p) => a + p[0], 0) / n;
  const my = pairs.reduce((a, p) => a + p[1], 0) / n;
  let num = 0, dx = 0, dy = 0;
  for (const [x, y] of pairs) { num += (x - mx) * (y - my); dx += (x - mx) ** 2; dy += (y - my) ** 2; }
  const den = Math.sqrt(dx * dy);
  return den ? num / den : null;
}

const num = (v, s = '') => v == null ? '—' : `${v.toFixed(1)}<small>${s}</small>`;
const pctv = (v) => v == null ? '—' : `${v}<small>%</small>`;
const signed = (v) => v == null ? '—' : (v > 0 ? '+' : '') + v;
const key = (v) => (v || '').toLowerCase().trim();

function renderDashboard(records) {
  teardownHero();
  setTag('Panel — Gestión del Talento');
  let fMod = 'all', fHito = 'all', fArea = 'all', fTutor = 'all', fPromo = 'all', fQ = '';
  /* `deb` vive aquí (no dentro de paint): si viviera dentro, cada repintado
     perdía la referencia y el timeout pendiente disparaba un paint fantasma.
     `entered` limita la entrada cinematográfica a la primera carga. */
  let deb = null, entered = false;

  // Normaliza. Hito viene como texto legible desde la lista.
  records.forEach((r) => {
    const h = key(r.Hito);
    r._h = h.includes('6') ? '6m' : h.includes('año') || h.includes('ano') || h.includes('12') ? '12m' : h.includes('salida') ? 'salida' : null;
    r._bec = key(r.Rol).startsWith('bec');
    // La promoción sale de P1 Inicio del maestro: exacta, no estimada
    r._promo = r.FechaInicio ? cursoDe(r.FechaInicio) : null;
    // Con qué texto se busca a esta persona
    r._buscar = canon([r.Nombre, r.Correo, r.CorreoBecario, r.Tutor].filter(Boolean).join(' '));
  });

  // Listas de filtro sacadas de los datos, no inventadas
  const uniq = (f) => [...new Set(records.map(f).filter(Boolean))].sort();
  const AREAS_D  = [...new Map(records.filter((r) => r.Area).map((r) => [canon(r.Area), r.Area.trim()])).values()].sort();
  const TUTORES_D = [...new Map(records.filter((r) => r.Tutor).map((r) => [canon(r.Tutor), r.Tutor.trim()])).values()].sort();
  const PROMOS_D  = uniq((r) => r._promo);
  const NIV_D     = uniq((r) => r.NivelEstudios);

  function paint() {
    clearTimeout(deb);  // corta cualquier repintado de búsqueda pendiente
    /* Un solo sitio donde se decide qué entra. `scoped` aplica lo mismo salvo el
       hito, porque las tarjetas por hito necesitan ver todos los hitos. */
    const pasa = (r, conHito) =>
      (fMod === 'all' || r.NivelEstudios === fMod) &&
      (fArea === 'all' || canon(r.Area) === canon(fArea)) &&
      (fTutor === 'all' || canon(r.Tutor) === canon(fTutor)) &&
      (fPromo === 'all' || r._promo === fPromo) &&
      (!fQ || r._buscar.includes(canon(fQ))) &&
      (!conHito || fHito === 'all' || r._h === fHito);

    const rows = records.filter((r) => pasa(r, true));
    const B = rows.filter((r) => r._bec), T = rows.filter((r) => !r._bec);
    const scoped = (f) => records.filter((r) => pasa(r, false) && f(r));

    const k = kpis(records, scoped, B, T, fMod);

    view.innerHTML = `
      <button class="btn--quiet" id="back" type="button">← Volver al inicio</button>
      <div class="dash-head">
        <div><h2>Panel del programa</h2>
          <p class="dash-sub">${records.length} respuesta${records.length !== 1 ? 's' : ''} ·
            ${records.filter((r) => r._bec).length} de becarios ·
            ${records.filter((r) => !r._bec).length} de tutores</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn--ghost" id="reload" type="button">Cargar otro CSV</button>
          <button class="btn btn--ghost" id="print" type="button">Imprimir / PDF</button>
        </div>
      </div>
      ${k.silencio}
      <div class="filter-row glass">
        <div class="filter-group"><span class="filter-label">Hito</span>
          ${['all', ...HITO_KEYS].map((h) => `<button class="filter" data-hito="${esc(h)}"
            aria-pressed="${fHito === h}" type="button">${h === 'all' ? 'Todos' : esc(HITOS[h].label)}</button>`).join('')}</div>
        ${PROMOS_D.length > 1 ? `<div class="filter-group"><span class="filter-label">Promoción</span>
          ${['all', ...PROMOS_D].map((x) => `<button class="filter" data-promo="${esc(x)}"
            aria-pressed="${fPromo === x}" type="button">${x === 'all' ? 'Todas' : esc(x)}</button>`).join('')}</div>` : ''}
        ${NIV_D.length > 1 ? `<div class="filter-group"><span class="filter-label">Estudios</span>
          ${['all', ...NIV_D].map((m) => `<button class="filter" data-mod="${esc(m)}"
            aria-pressed="${fMod === m}" type="button">${m === 'all' ? 'Todos' : esc(m)}</button>`).join('')}</div>` : ''}
        ${AREAS_D.length > 1 ? `<div class="filter-group"><span class="filter-label">Área</span>
          <select class="filter-sel" id="f-area">
            <option value="all">Todas las áreas</option>
            ${AREAS_D.map((a) => `<option value="${esc(a)}" ${fArea === a ? 'selected' : ''}>${esc(a)}</option>`).join('')}
          </select></div>` : ''}
        ${TUTORES_D.length > 1 ? `<div class="filter-group"><span class="filter-label">Tutor</span>
          <select class="filter-sel" id="f-tutor">
            <option value="all">Todos los tutores</option>
            ${TUTORES_D.map((t) => `<option value="${esc(t)}" ${fTutor === t ? 'selected' : ''}>${esc(t)}</option>`).join('')}
          </select></div>` : ''}
        <div class="filter-search">
          <input type="search" id="f-q" placeholder="Buscar persona…" value="${esc(fQ)}"
            aria-label="Buscar por nombre o correo">
          ${(fMod !== 'all' || fHito !== 'all' || fArea !== 'all' || fTutor !== 'all' || fPromo !== 'all' || fQ)
            ? '<button class="filter-reset" id="f-reset" type="button">Quitar filtros</button>' : ''}
        </div>
      </div>
      ${!rows.length ? `<div class="empty"><h3>Sin respuestas para este filtro</h3>
        <p>Prueba con otra modalidad u otro hito.</p></div>` : k.html}`;

    /* Entrada cinematográfica: stagger de 70ms con easing (0.22,1,0.36,1),
       solo la primera vez — repintar por un filtro no debe re-animar todo. */
    view.classList.toggle('dash-enter', !entered);
    if (!entered) $$('.guide, .kpi, .card, .section-label, .filter-row', view)
      .forEach((el, i) => el.style.setProperty('--d', String(Math.min(i, 14))));
    entered = true;

    $('#back').addEventListener('click', renderLanding);
    $('#reload').addEventListener('click', () => renderImport());
    $('#print').addEventListener('click', () => window.print());
    $$('[data-mod]', view).forEach((b) => b.addEventListener('click', () => { fMod = b.dataset.mod; paint(); }));
    $$('[data-hito]', view).forEach((b) => b.addEventListener('click', () => { fHito = b.dataset.hito; paint(); }));
    $$('[data-promo]', view).forEach((b) => b.addEventListener('click', () => { fPromo = b.dataset.promo; paint(); }));
    $('#f-area')?.addEventListener('change', (e) => { fArea = e.target.value; paint(); });
    $('#f-tutor')?.addEventListener('change', (e) => { fTutor = e.target.value; paint(); });
    $('#f-reset')?.addEventListener('click', () => { fMod = fHito = fArea = fTutor = fPromo = 'all'; fQ = ''; paint(); });
    const q = $('#f-q');
    if (q) {
      // Repinta al soltar la tecla, con una pausa: sin esto, cada letra recalcula
      // todos los KPIs y escribir se vuelve pastoso. (`deb` vive fuera de paint.)
      q.addEventListener('input', (e) => {
        clearTimeout(deb);
        const v = e.target.value;
        deb = setTimeout(() => {
          fQ = v; paint();
          const nq = $('#f-q');
          if (nq) { nq.focus(); nq.setSelectionRange(nq.value.length, nq.value.length); }
        }, 260);
      });
    }
    $$('.table-toggle', view).forEach((b) => b.addEventListener('click', () => {
      const t = $(`#${b.dataset.target}`);
      const open = !t.hidden;
      t.hidden = open;
      b.textContent = open ? 'Ver tabla' : 'Ver gráfico';
      b.setAttribute('aria-expanded', String(!open));
    }));
    initGlassSheen();
    initTilt();
    animateIn();
  }
  swapView(paint);  // la primera carga entra con cross-fade nativo
}

/** Las barras se dibujan y los números suben al entrar en pantalla. */
function animateIn() {
  const bars = $$('.bar-fill[data-w], .funnel-bar[data-w]', view);
  const nums = $$('[data-count]', view);
  if (reduced()) {
    bars.forEach((b) => { b.style.width = b.dataset.w + '%'; });
    nums.forEach((n) => { n.textContent = n.dataset.count; });
    return;
  }
  const io = new IntersectionObserver((es) => es.forEach((e) => {
    if (!e.isIntersecting) return;
    io.unobserve(e.target);
    if (e.target.dataset.w != null) {
      setTimeout(() => { e.target.style.width = e.target.dataset.w + '%'; }, 40);
    } else {
      const to = parseFloat(e.target.dataset.count.replace(',', '.')) || 0;
      const dec = (e.target.dataset.count.match(/[.,](\d+)/) || ['', ''])[1].length;
      const sign = e.target.dataset.count.trim().startsWith('+') ? '+' : '';
      const t0 = performance.now();
      const tick = (t) => {
        const p = Math.min(1, (t - t0) / 750);
        const v = to * (1 - Math.pow(1 - p, 3));
        e.target.textContent = sign + v.toFixed(dec);
        if (p < 1) requestAnimationFrame(tick); else e.target.textContent = e.target.dataset.count;
      };
      requestAnimationFrame(tick);
    }
  }), { threshold: 0.2 });
  [...bars, ...nums].forEach((el) => io.observe(el));
}

const kpi = (label, value, sub = '', variant = '', count = null) => `
  <div class="kpi glass ${variant ? 'kpi--' + variant : ''}">
    <p class="kpi-label">${esc(label)}</p>
    <p class="kpi-value">${count != null ? `<span data-count="${esc(count)}">0</span>${value}` : value}</p>
    ${sub ? `<p class="kpi-sub">${esc(sub)}</p>` : ''}</div>`;

/* Una barra, o nada si no hay dato. Sin esto, min-width:2px pinta un muñón que
   se lee como "un valor bajísimo" en vez de "no se preguntó". */
const bar = (v, max, cls, label) => v == null
  ? `<span class="bar-nodata" title="${esc(label)}: no se preguntó en este hito"></span>`
  : `<div class="bar-fill ${cls}" data-w="${((v / max) * 100).toFixed(1)}"
       title="${esc(label)}: ${v.toFixed(1)} de ${max}"></div>`;

const card = (title, note, body, tableId) => `
  <div class="card glass">
    <div class="card-head"><h4>${esc(title)}</h4>
      ${tableId ? `<button class="table-toggle" data-target="${tableId}" aria-expanded="false" type="button">Ver tabla</button>` : ''}</div>
    <p class="card-note">${note}</p>${body}</div>`;

const tbl = (id, caption, headers, rows) => `
  <div class="scroll-x"><table class="data-table" id="${id}" hidden><caption>${esc(caption)}</caption>
    <thead><tr>${headers.map((h) => `<th>${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map((r) => `<tr>${r.map((c) => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;

const secLabel = (t, s) => `<div class="section-label"><h3>${esc(t)}</h3><span>${esc(s)}</span></div>`;

/** Una frase que explica lo que se está viendo, escrita con los datos reales. */
const lectura = (txt, tono = '') =>
  `<div class="reading ${tono ? 'reading--' + tono : ''}">${icon('info')}<div>${txt}</div></div>`;

/** Cómo se lee cada cosa. Va arriba del todo porque nadie nace sabiendo qué es un eNPS. */
const guia = () => `
  <div class="guide glass">
    <h4>Cómo leer este panel</h4>
    <dl>
      <dt>eNPS</dt>
      <dd>Va de <b>−100 a +100</b>, y <b>no es un porcentaje</b>. Se calcula restando el % de
        detractores (puntúan 0–6) al % de promotores (9–10). Referencia: <b>bajo 0</b> es una
        alarma — hay más gente descontenta que entusiasta; <b>0 a 30</b> es normal;
        <b>más de 30</b> es bueno; <b>más de 50</b> es excelente.</dd>
      <dt>Escalas 1–5</dt>
      <dd>Media de las respuestas. <b>Por debajo de 3 es un suspenso</b>: significa que la mayoría
        marcó "bajo" o "muy bajo". Entre 3 y 4 es aceptable pero mejorable; por encima de 4, bien.</dd>
      <dt>Satisfacción 1–10</dt>
      <dd>Media directa. Es la nota que le pondrían al programa.</dd>
      <dt>n = …</dt>
      <dd>Cuántas respuestas sostienen ese número. <b>Es lo primero que hay que mirar:</b> una
        media de 3 respuestas no es una media, es una anécdota. Aparece en todos los KPIs.</dd>
      <dt>Correlación (r)</dt>
      <dd>Va de 0 a 1: cuánto se mueven juntas dos cosas. <b>No demuestra causa</b>, solo que van
        de la mano. Se ocultan las de menos de ${N_MIN} respuestas.</dd>
      <dt>Rayado gris</dt>
      <dd>Esa pregunta <b>no se hace</b> en ese hito. No es un cero: es que no se preguntó.</dd>
    </dl>
  </div>`;

// ═══════════════════════════════════════════════════════════════════════
//  LOS KPIs
// ═══════════════════════════════════════════════════════════════════════
function kpis(records, scoped, B, T, fMod) {
  const H = [];

  /* IT asigna correos opacos tipo BEC240@mpascensores.com, así que el panel
     resuelve el nombre a partir de lo que el propio becario escribió.
     El emparejamiento sigue siendo por correo — único e inmutable —; el nombre
     es solo para que esto se pueda leer. */
  const nombres = new Map();
  records.forEach((r) => {
    if (r._bec && r.Correo && r.Nombre) nombres.set(key(r.Correo), r.Nombre.trim());
    if (!r._bec && r.CorreoBecario && r.Nombre) nombres.set(key(r.CorreoBecario), r.Nombre.trim());
  });
  const quien = (correo) => nombres.get(key(correo)) || (correo || '—');
  const quienCorto = (correo) => {
    const n = nombres.get(key(correo));
    return n ? n : (correo || '—').split('@')[0];
  };
  const DIMS_BEC = [
    { name: 'Acogida',     fs: ['ac1','ac2','ac3','ac4','ac5'] },
    { name: 'Aprendizaje', fs: ['ap1','ap2','ap3','ap4','ap5'] },
    { name: 'Tutoría',     fs: ['tr1','tr2','tr3','tr4'] },
    { name: 'Cultura',     fs: ['cu1','cu2','cu3','cu4'] },
  ];

  // ── 17 · Cobertura y detector de silencio ────────────────────────────
  const fechas = records.map((r) => Date.parse(r.EnviadoEn)).filter((x) => !isNaN(x));
  const ultima = fechas.length ? Math.max(...fechas) : null;
  const dias = ultima ? Math.floor((Date.now() - ultima) / 864e5) : null;
  const silencio = dias != null && dias > 30
    ? `<div class="banner banner--warn">${icon('warn')}<div><b>Llevas ${dias} días sin respuestas nuevas.</b>
       Si eso no cuadra con el calendario del programa, revisa el historial del flujo en Power
       Automate: lo más probable es que se haya apagado (licencia caducada o error) y nadie se
       haya enterado.</div></div>` : '';

  // ── 1 · eNPS y satisfacción por hito ─────────────────────────────────
  const porHito = HITO_KEYS.map((h) => {
    const b = scoped((r) => r._bec && r._h === h);
    return { key: h, name: HITOS[h].label, n: b.length, nps: nps(b, 'gl2'), sat: mean(b, ['gl1']) };
  }).filter((d) => d.n);

  H.push(guia());

  if (porHito.length) {
    H.push(secLabel('Salud del programa', '¿Se mantiene la satisfacción con el tiempo?'));
    H.push(`<div class="kpis">${porHito.map((d) => kpi(`eNPS · ${d.name}`,
      '', `${d.n} respuesta${d.n !== 1 ? 's' : ''} · sat. ${d.sat ? d.sat.toFixed(1) + '/10' : '—'}`,
      d.nps == null ? '' : d.nps >= 30 ? 'good' : d.nps < 0 ? 'risk' : 'accent',
      d.nps == null ? null : signed(d.nps))).join('')}</div>`);

    // Lectura del eNPS, escrita con los números que hay delante
    const con = porHito.filter((d) => d.nps != null);
    if (con.length >= 2) {
      const a = con[0], z = con[con.length - 1], dif = z.nps - a.nps;
      let caida = null;
      for (let i = 1; i < con.length; i++) {
        const d = con[i].nps - con[i - 1].nps;
        if (!caida || d < caida.d) caida = { d, de: con[i - 1].name, a: con[i].name };
      }
      const flojo = Math.min(...con.map((d) => d.n)) < N_MIN;
      H.push(lectura(
        dif <= -15
          ? `<b>La satisfacción se desploma con el tiempo.</b> El eNPS pasa de
             <b>${signed(a.nps)}</b> en ${a.name.toLowerCase()} a <b>${signed(z.nps)}</b> en
             ${z.name.toLowerCase()}: ${Math.abs(dif)} puntos de caída. El mayor bajón ocurre
             <b>entre ${caida.de.toLowerCase()} y ${caida.a.toLowerCase()}</b> (${caida.d} puntos),
             que es donde hay que intervenir.
             ${z.nps < 0 ? ' Terminan en negativo: <b>se van más descontentos que contentos</b>, y esos son los que hablan de MP en su centro.' : ''}
             ${flojo ? ' <b>Ojo:</b> algún hito tiene menos de ' + N_MIN + ' respuestas, así que la tendencia es orientativa.' : ''}`
          : dif >= 15
            ? `<b>La satisfacción mejora con el tiempo:</b> de ${signed(a.nps)} a ${signed(z.nps)}.
               Cuanto más tiempo llevan, más recomiendan el programa.`
            : `El eNPS se mantiene estable (${signed(a.nps)} → ${signed(z.nps)}). No hay deterioro
               claro entre hitos.`,
        dif <= -15 ? 'alert' : dif >= 15 ? 'good' : ''));
    }
    H.push(card('Satisfacción global por hito', 'Escala 1–10 · la barra más oscura es el hito más tardío',
      `<div class="bars">${porHito.map((d, i) => `<div class="bar-row">
        <span class="bar-name">${esc(d.name)} <small style="color:var(--ink-muted)">n=${d.n}</small></span>
        <div class="bar-lane">${bar(d.sat, 10, `bar-fill--h${i + 1}`, d.name)}
          <span class="bar-value">${d.sat?.toFixed(1) ?? '—'}</span></div></div>`).join('')}</div>
      <div class="bar-axis"><span>0</span><span>10</span></div>` +
      tbl('t-hito', 'Satisfacción y eNPS por hito', ['Hito','n','Satisfacción','eNPS'],
        porHito.map((d) => [esc(d.name), d.n, d.sat?.toFixed(1) ?? '—', d.nps ?? '—'])), 't-hito'));
  }

  // ── 2 · Deriva por dimensión ─────────────────────────────────────────
  const deriva = DIMS_BEC.map((d) => ({ name: d.name,
    vals: HITO_KEYS.map((h) => mean(scoped((r) => r._bec && r._h === h), d.fs)) }))
    .filter((d) => d.vals.some((v) => v != null));
  if (deriva.length) {
    H.push(card('Deriva por dimensión entre hitos', 'Escala 1–5 · <b>qué se degrada primero</b>',
      `<div class="legend">${HITO_KEYS.map((h, i) => `<span class="legend-item">
        <span class="legend-swatch" style="background:var(--hito-${i + 1})"></span>${esc(HITOS[h].label)}</span>`).join('')}</div>
      <div class="bars">${deriva.map((d) => `<div class="bar-row">
        <span class="bar-name">${esc(d.name)}</span>
        <div>${d.vals.map((v, i) => `<div class="bar-lane">${bar(v, 5, `bar-fill--h${i + 1}`, `${d.name} — ${HITOS[HITO_KEYS[i]].label}`)}
          <span class="bar-value">${v?.toFixed(1) ?? '—'}</span></div>`).join('')}</div></div>`).join('')}</div>
      <div class="bar-axis"><span>0</span><span>5</span></div>` +
      tbl('t-deriva', 'Media por dimensión y hito — escala 1–5', ['Dimensión', ...HITO_KEYS.map((h) => HITOS[h].label)],
        deriva.map((d) => [esc(d.name), ...d.vals.map((v) => v?.toFixed(1) ?? '—')])) +
      (() => {
        // ¿Cuál cae más entre el primer y el último hito con dato?
        const caidas = deriva.map((d) => {
          const v = d.vals.filter((x) => x != null);
          return v.length >= 2 ? { name: d.name, d: v[v.length - 1] - v[0], fin: v[v.length - 1] } : null;
        }).filter(Boolean).sort((a, b) => a.d - b.d);
        if (!caidas.length) return '';
        const peor = caidas[0];
        if (peor.d >= -0.2) return lectura('Ninguna dimensión se degrada de forma clara entre hitos.');
        const bajo = caidas.filter((c) => c.fin < 3);
        return lectura(`<b>${esc(peor.name)} es lo que más se deteriora</b>: pierde
          ${Math.abs(peor.d).toFixed(1)} puntos entre el primer hito y el último, más que ninguna otra.
          ${bajo.length ? `Y termina por debajo de 3, que es un suspenso: <b>${bajo.map((c) => esc(c.name)).join(' y ')}</b> ${bajo.length > 1 ? 'están' : 'está'} en zona de suspenso al final.` : ''}
          Si solo puedes atacar una cosa, empieza por aquí.`, peor.d < -0.5 ? 'alert' : '');
      })(), 't-deriva'));
  }

  // ── 12 · Palancas: qué dimensión mueve el eNPS ───────────────────────
  const palancas = DIMS_BEC.map((d) => {
    const pairs = B.map((r) => [rowMean(r, d.fs), parseFloat(r.gl2)])
      .filter((p) => p[0] != null && !isNaN(p[1]));
    return { name: d.name, r: pearson(pairs), n: pairs.length };
  }).filter((d) => d.r != null).sort((a, b) => b.r - a.r);
  if (palancas.length) {
    H.push(card('Palancas — qué mueve el eNPS',
      `Correlación de cada dimensión con la recomendación. <b>Cuanto más alta, antes conviene invertir ahí.</b>
       Se ocultan las que tienen menos de ${N_MIN} respuestas: por debajo de eso una correlación es ruido.`,
      `<div class="bars">${palancas.map((d) => `<div class="bar-row">
        <span class="bar-name">${esc(d.name)} <small style="color:var(--ink-muted)">n=${d.n}</small></span>
        <div class="bar-lane">${bar(Math.max(0, d.r), 1, 'bar-fill--1', d.name)}
          <span class="bar-value">${d.r.toFixed(2)}</span></div></div>`).join('')}</div>
      <div class="bar-axis"><span>0</span><span>1 = correlación total</span></div>` +
      tbl('t-pal', 'Correlación dimensión ↔ eNPS', ['Dimensión','r','n'],
        palancas.map((d) => [esc(d.name), d.r.toFixed(2), d.n])) +
      lectura(`<b>${esc(palancas[0].name)} es lo que más pesa</b> en que un becario recomiende
        el programa (r = ${palancas[0].r.toFixed(2)}, n = ${palancas[0].n})${palancas.length > 1
          ? `, por delante de ${esc(palancas[1].name.toLowerCase())} (${palancas[1].r.toFixed(2)})` : ''}.
        Traducido: mejorar ${esc(palancas[0].name.toLowerCase())} es donde más se nota el esfuerzo.
        <b>Cuidado:</b> esto dice que van de la mano, no que una cause la otra — puede haber una
        tercera cosa detrás.`), 't-pal'));
  }

  // ── 3 · Matriz 9-box ─────────────────────────────────────────────────
  // Cruza por correo: desempeño que da el tutor × intención del becario.
  const perfBy = new Map();
  scoped((r) => !r._bec).forEach((r) => {
    const m = rowMean(r, ['d1','d2','d3','d4','d5','d6']);
    if (m != null && r.CorreoBecario) perfBy.set(key(r.CorreoBecario), m);
  });
  const nine = [];
  scoped((r) => r._bec && r._h === '12m').forEach((r) => {
    const p = perfBy.get(key(r.Correo));
    if (p == null || !answered(r.pr3)) return;
    const pi = p >= 4 ? 2 : p >= 3 ? 1 : 0;                       // bajo / medio / alto
    const ii = r.pr3 === 'Sí' ? 2 : r.pr3 === 'Quizás' ? 1 : 0;    // no / quizás / sí
    nine.push({ correo: r.Correo, dept: r.Departamento, p, pi, ii });
  });
  if (nine.length) {
    const PL = ['Bajo','Medio','Alto'], IL = ['No quiere','Quizás','Sí quiere'];
    const tone = (pi, ii) => pi === 2 && ii === 0 ? 'crit' : pi === 2 && ii === 2 ? 'good'
      : pi === 2 && ii === 1 ? 'warn' : pi === 0 && ii === 0 ? '' : '';
    const cellOf = (pi, ii) => nine.filter((x) => x.pi === pi && x.ii === ii);
    H.push(secLabel('Matriz de talento', `${nine.length} becario${nine.length !== 1 ? 's' : ''} con tutor y respuesta a los 12 meses`));
    H.push(card('Desempeño × intención de quedarse',
      `Desempeño según su tutor/a (media de d1–d6) frente a lo que responde el becario.
       <b>El cuadrante rojo es la urgencia:</b> gente que rinde y quiere irse.`,
      `<div class="ninebox">
        <div class="nb-corner"></div>
        ${IL.map((l) => `<div class="nb-axis-x">${l}</div>`).join('')}
        ${[2,1,0].map((pi) => `
          <div class="nb-axis-y">${PL[pi]}</div>
          ${[0,1,2].map((ii) => {
            const c = cellOf(pi, ii);
            return `<div class="nb-cell" ${tone(pi, ii) ? `data-tone="${tone(pi, ii)}"` : ''}>
              <p class="nb-tag">${PL[pi]} · ${IL[ii]}</p>
              <p class="nb-count">${c.length}</p>
              ${c.slice(0, 4).map((x) => `<span class="nb-name" title="${esc(quien(x.correo))} · ${esc(x.correo)} · ${esc(x.dept || '')}">${esc(quienCorto(x.correo))}</span>`).join('')}
              ${c.length > 4 ? `<span class="nb-name">+${c.length - 4} más</span>` : ''}
            </div>`;
          }).join('')}`).join('')}
      </div>
      <p class="card-note" style="margin:14px 0 0">Eje vertical: desempeño · Eje horizontal: intención de continuar</p>` +
      tbl('t-9box', 'Matriz de talento', ['Becario','Correo','Departamento','Desempeño','Intención'],
        nine.sort((a, b) => b.p - a.p).map((x) => [esc(quien(x.correo)), esc(x.correo), esc(x.dept || '—'), x.p.toFixed(1), esc(IL[x.ii])])) +
      (() => {
        const crit = cellOf(2, 0), dudan = cellOf(2, 1), bien = cellOf(2, 2);
        if (!crit.length && !dudan.length)
          return lectura(`Ninguno de tus becarios de alto desempeño quiere irse. ${bien.length
            ? `<b>${bien.length} rinden bien y quieren quedarse</b>: son la lista de incorporación.` : ''}`, 'good');
        return lectura(`<b>${crit.length ? `${crit.length} becario${crit.length !== 1 ? 's' : ''} rinde${crit.length !== 1 ? 'n' : ''} bien y no quiere${crit.length !== 1 ? 'n' : ''} quedarse` : 'Nadie de alto rendimiento se quiere ir'}</b>${dudan.length
          ? `, y otro${dudan.length !== 1 ? 's' : ''} ${dudan.length} de alto desempeño dudan` : ''}.
          ${crit.length ? `Son la conversación más urgente que tienes: cada uno es alguien a quien su tutor/a
          puntúa por encima de 4 y que va a salir por la puerta. ` : ''}
          ${bien.length ? `Enfrente, <b>${bien.length} rinde${bien.length !== 1 ? 'n' : ''} bien y quiere${bien.length !== 1 ? 'n' : ''} quedarse</b>: esa es tu lista de incorporación.` : ''}
          Los nombres están en cada celda; el detalle completo, en "Ver tabla".`, crit.length ? 'alert' : '');
      })(), 't-9box'));
  }

  // ── 4/5 · Embudo y fugas del proceso ─────────────────────────────────
  const bec12 = scoped((r) => r._bec && r._h === '12m');
  const tut12 = scoped((r) => !r._bec && ['12m','salida'].includes(r._h));
  const tutSal = scoped((r) => !r._bec && r._h === 'salida');
  const becSal = scoped((r) => r._bec && r._h === 'salida');

  const wantSet = bec12.filter((r) => ['Sí','Quizás'].includes(r.pr3)).map((r) => key(r.Correo)).filter(Boolean);
  const tutSet = tut12.filter((r) => INCORPORARIA.slice(0, 2).includes(r.i1)).map((r) => key(r.CorreoBecario)).filter(Boolean);
  const matched = wantSet.filter((e) => tutSet.includes(e)).length;

  const funnel = [
    { name: 'Becarios que quieren quedarse', v: share(bec12, 'pr3', ['Sí','Quizás']), n: bec12.length },
    { name: 'Tutores que incorporarían', v: share(tut12, 'i1', INCORPORARIA.slice(0, 2)), n: tut12.length },
    { name: 'Match (ambos sí)', v: wantSet.length ? Math.round((matched / wantSet.length) * 100) : null, n: wantSet.length },
    // Del Estado del maestro, no de lo que recuerde el tutor
    { name: 'Incorporados realmente', v: share(becSal, 'Estado', ['PASO A PLANTILLA']), n: becSal.length },
  ].filter((s) => s.v != null);

  if (funnel.length) {
    H.push(secLabel('Paso a plantilla', 'Dónde se cae el proceso'));
    H.push(card('Embudo de conversión',
      'Cada etapa sobre su propia base · el match cruza por correo, <b>no multiplica porcentajes</b>',
      `<div class="funnel">${funnel.map((s, i) => {
        const prev = i > 0 ? funnel[i - 1].v : null;
        const drop = prev != null && s.v < prev ? prev - s.v : null;
        const shade = ['var(--hito-1)','var(--hito-2)','var(--hito-3)','var(--mp-gray)'][i];
        return `<div class="funnel-step"><span class="funnel-name">${esc(s.name)}
          <small style="color:var(--ink-muted)">n=${s.n}</small></span>
          <div class="funnel-bar" data-w="${s.v}" style="background:${shade}" title="${esc(s.name)}: ${s.v}% de ${s.n}"></div>
          <span class="funnel-val">${s.v}%${drop ? `<span class="funnel-drop">−${drop}</span>` : ''}</span></div>`;
      }).join('')}</div><div class="bar-axis"><span>0%</span><span>100%</span></div>` +
      tbl('t-funnel', 'Embudo de paso a plantilla', ['Etapa','%','Base'],
        funnel.map((s) => [esc(s.name), s.v + '%', s.n])) +
      (() => {
        let peor = null;
        for (let i = 1; i < funnel.length; i++) {
          const d = funnel[i].v - funnel[i - 1].v;
          if (!peor || d < peor.d) peor = { d, de: funnel[i - 1], a: funnel[i] };
        }
        const fin = funnel[funnel.length - 1];
        if (!peor || peor.d >= 0) return lectura('El embudo no pierde gente entre etapas.');
        return lectura(`<b>La mayor pérdida está entre "${esc(peor.de.name.toLowerCase())}" y
          "${esc(peor.a.name.toLowerCase())}"</b>: se caen ${Math.abs(peor.d)} puntos.
          ${fin.name.includes('Incorporados') ? `Al final solo se incorpora el <b>${fin.v}%</b>.` : ''}
          Cada etapa se mide sobre su propia base (por eso un porcentaje puede subir): no son
          porcentajes encadenados, son cuatro preguntas distintas a cuatro grupos distintos.`,
          Math.abs(peor.d) > 25 ? 'alert' : '');
      })(), 't-funnel'));
  }

  // 4 · Oferta no realizada — el fallo de proceso más caro
  const noOferta = becSal.filter((r) => tutSet.includes(key(r.Correo)) && r.sa3 === 'No');
  const rechazos = becSal.filter((r) => r.sa3 === 'Sí, pero la rechacé');
  const kpiProc = [];
  if (becSal.length) {
    kpiProc.push(kpi('Oferta no realizada', '', `${noOferta.length} de ${tutSet.length} que el tutor sí quería`,
      noOferta.length ? 'risk' : 'good', String(noOferta.length)));
    kpiProc.push(kpi('Ofertas rechazadas', '', `de ${becSal.length} salidas`, rechazos.length ? 'accent' : '', String(rechazos.length)));
    const boom = share(becSal, 'sa5', ['Sí','Quizás']);
    if (boom != null) kpiProc.push(kpi('Volverían a MP', pctv(boom).replace(/^\d+/, ''), 'Potencial boomerang', 'good', String(boom)));
    const compe = share(becSal, 'sa2', ['Otra empresa']);
    if (compe != null) kpiProc.push(kpi('Se van a otra empresa', pctv(compe).replace(/^\d+/, ''), 'vs. seguir estudiando', compe > 40 ? 'risk' : ''));
  }
  if (kpiProc.length) H.push(`<div class="kpis" style="margin-top:14px">${kpiProc.join('')}</div>`);

  if (noOferta.length) {
    H.push(card('Su tutor/a los quería y nadie les hizo una oferta',
      'Cruce de <b>i1</b> (el tutor los incorporaría) con <b>sa3</b> (el becario dice que no se le ofreció continuidad). <b>Es un fallo de proceso, no de la persona.</b>',
      `<div class="risk-list">${noOferta.map((r) => `<div class="risk-item">
        <span class="risk-who">${esc(quien(r.Correo))} <small style="color:var(--ink-muted);font-weight:400">${esc(r.Correo)}</small> · ${esc(r.Departamento || '—')}</span>
        <span class="risk-why">${esc(r.sa1 || 'sin motivo declarado')}</span></div>`).join('')}</div>`));
  }

  // ── 10/11 · Conversaciones de futuro ─────────────────────────────────
  if (bec12.length) {
    const sinHablar = bec12.filter((r) => r.pr2 === 'No');
    const conHablar = bec12.filter((r) => r.pr2 === 'Sí');
    const qSin = share(sinHablar, 'pr3', ['Sí']);
    const qCon = share(conHablar, 'pr3', ['Sí']);
    H.push(secLabel('Conversaciones de futuro', 'La palanca más barata de todas'));
    H.push(`<div class="kpis">
      ${kpi('Sin conversación de futuro', pctv(share(bec12, 'pr2', ['No'])).replace(/^\d+/, ''),
        `${sinHablar.length} de ${bec12.length} a los 12 meses`, 'risk', String(share(bec12, 'pr2', ['No'])))}
      ${qCon != null ? kpi('Quieren quedarse · SÍ hablaron', pctv(qCon).replace(/^\d+/, ''), `n=${conHablar.length}`, 'good', String(qCon)) : ''}
      ${qSin != null ? kpi('Quieren quedarse · NO hablaron', pctv(qSin).replace(/^\d+/, ''), `n=${sinHablar.length}`, 'risk', String(qSin)) : ''}
      ${kpi('Claridad de recorrido', num(mean(bec12, ['pr1']), '/5'), 'pr1 · a los 12 meses')}
    </div>`);
    if (qCon != null && qSin != null) {
      const diff = qCon - qSin;
      H.push(`<p class="card-note" style="margin:10px 4px 0">
        ${sinHablar.length < N_MIN || conHablar.length < N_MIN
          ? `Aún hay pocos datos para comparar (n=${conHablar.length} vs n=${sinHablar.length}). La diferencia de ${Math.abs(diff)} puntos es orientativa, no concluyente.`
          : `<b>${diff > 0 ? `${diff} puntos más` : `${Math.abs(diff)} puntos menos`}</b> de intención de quedarse entre quienes tuvieron una conversación de futuro. ${diff > 15 ? 'Suficiente para justificar hacerla obligatoria.' : ''}`}</p>`);
    }
  }

  // ── 6/7 · Calidad de la selección ────────────────────────────────────
  const bec6 = scoped((r) => r._bec && r._h === '6m');
  const centros = [...new Set(records.filter((r) => r.EntidadFormativa).map((r) => r.EntidadFormativa))];
  const porCentro = centros.map((c) => {
    const bs = scoped((r) => r._bec && r.EntidadFormativa === c);
    const correos = bs.map((r) => key(r.Correo));
    const ts = scoped((r) => !r._bec && correos.includes(key(r.CorreoBecario)));
    return { name: c, n: bs.length, desemp: mean(ts, ['d1','d2','d3','d4','d5','d6']),
             ret: share(bs.filter((r) => r._h === '12m'), 'pr3', ['Sí','Quizás']) };
  }).filter((d) => d.n).sort((a, b) => (b.desemp ?? 0) - (a.desemp ?? 0));

  if (bec6.length || porCentro.length) {
    H.push(secLabel('Calidad de la selección', 'Qué prometemos y a quién fichamos'));
    const promesa = mean(bec6, ['ac5']);
    H.push(`<div class="kpis">
      ${kpi('Promesa vs realidad', num(promesa, '/5'), 'ac5 · si baja, selección sobrevende',
        promesa == null ? '' : promesa < 3.5 ? 'risk' : 'good')}
      ${kpi('Perfil ajustado', num(mean(scoped((r) => !r._bec), ['ad2']), '/5'), 'ad2 · según el tutor')}
      ${kpi('Formación adecuada', num(mean(scoped((r) => !r._bec), ['ad3']), '/5'), 'ad3 · según el tutor')}
      ${kpi('Acogida organizada', num(mean(bec6, ['ac4']), '/5'), 'ac4 · a los 6 meses')}
    </div>`);
    if (porCentro.length) {
      H.push(card('Por centro educativo',
        'Desempeño medio que le da el tutor y retención a los 12 meses. <b>Dónde reclutar y dónde no.</b>',
        `<div class="bars">${porCentro.map((d) => `<div class="bar-row">
          <span class="bar-name">${esc(d.name)} <small style="color:var(--ink-muted)">n=${d.n}</small></span>
          <div class="bar-lane">${bar(d.desemp, 5, 'bar-fill--1', `${d.name} — desempeño`)}
            <span class="bar-value">${d.desemp?.toFixed(1) ?? '—'}</span></div></div>`).join('')}</div>
        <div class="bar-axis"><span>0</span><span>5 · desempeño</span></div>` +
        tbl('t-centro', 'Por centro educativo', ['Centro','Becarios','Desempeño','Quieren quedarse'],
          porCentro.map((d) => [esc(d.name), d.n, d.desemp?.toFixed(1) ?? '—', d.ret != null ? d.ret + '%' : '—'])), 't-centro'));
    }
  }

  // ── 8/9/14 · Tutoría ─────────────────────────────────────────────────
  /* El tutor sale del maestro (columna Tutor/a), no de quien rellenó el formulario:
     así el nombre es consistente y no depende de erratas al teclear. */
  const tutores = [...new Set(records.filter((r) => r.Tutor).map((r) => r.Tutor.trim()))];
  const ranking = tutores.map((t) => {
    const bs = scoped((r) => r._bec && canon(r.Tutor) === canon(t));
    return { name: t, correo: '', n: bs.length, score: mean(bs, ['tr1','tr2','tr3','tr4']) };
  }).filter((d) => d.score != null).sort((a, b) => b.score - a.score);

  const novatos = scoped((r) => !r._bec && r.primera_vez === 'Sí').map((r) => key(r.CorreoBecario));
  const veteranos = scoped((r) => !r._bec && r.primera_vez === 'No').map((r) => key(r.CorreoBecario));
  const scoreNov = mean(scoped((r) => r._bec && novatos.includes(key(r.Correo))), ['tr1','tr2','tr3','tr4']);
  const scoreVet = mean(scoped((r) => r._bec && veteranos.includes(key(r.Correo))), ['tr1','tr2','tr3','tr4']);

  if (T.length) {
    H.push(secLabel('Tutoría', 'Quién tutoriza bien y quién necesita ayuda'));
    H.push(`<div class="kpis">
      ${kpi('Calidad de tutoría', num(mean(B, ['tr1','tr2','tr3','tr4']), '/5'), 'según los becarios')}
      ${kpi('Tutor novato', num(scoreNov, '/5'), `n=${novatos.length} · primera vez`, scoreNov != null && scoreVet != null && scoreNov < scoreVet - .4 ? 'risk' : '')}
      ${kpi('Tutor con experiencia', num(scoreVet, '/5'), `n=${veteranos.length}`)}
      ${kpi('NPS tutores', '', 'p3 · ¿recomiendan el programa?', 'accent', nps(T, 'p3') == null ? null : signed(nps(T, 'p3')))}
      ${kpi('Repetirían como tutor', pctv(share(T, 'p2', ['Sí'])).replace(/^\d+/, ''), 'p2 · salud del programa', 'good', String(share(T, 'p2', ['Sí'])))}
      ${kpi('Satisfacción tutor', num(mean(T, ['p1']), '/10'))}
    </div>`);
    if (scoreNov != null && scoreVet != null && (novatos.length < N_MIN || veteranos.length < N_MIN)) {
      H.push(`<p class="card-note" style="margin:10px 4px 0">La comparación novato/veterano va con
        pocos datos (n=${novatos.length} vs n=${veteranos.length}): orientativa, no concluyente.</p>`);
    }
    if (ranking.length > 1) {
      H.push(card('Ranking de tutores',
        'Nota media que le dan sus propios becarios (tr1–tr4). <b>Quién debería seguir tutorizando, y quién necesita formación.</b>',
        `<div class="bars">${ranking.map((d) => `<div class="bar-row">
          <span class="bar-name">${esc(d.name)} <small style="color:var(--ink-muted)">n=${d.n}</small></span>
          <div class="bar-lane">${bar(d.score, 5, 'bar-fill--1', d.name)}
            <span class="bar-value">${d.score.toFixed(1)}</span></div></div>`).join('')}</div>
        <div class="bar-axis"><span>0</span><span>5</span></div>` +
        tbl('t-tut', 'Ranking de tutores', ['Tutor','Becarios','Nota'],
          ranking.map((d) => [esc(d.name), d.n, d.score.toFixed(1)])), 't-tut'));
    }
  }

  // ── 18 · Riesgo compuesto ────────────────────────────────────────────
  const riesgo = bec12.map((r) => {
    let s = 0; const why = [];
    const e = parseInt(r.gl2, 10);
    if (!isNaN(e) && e <= 6) { s += 3; why.push(`eNPS ${e}`); }
    if (r.pr3 === 'No') { s += 4; why.push('no quiere quedarse'); }
    else if (r.pr3 === 'Quizás') { s += 1; why.push('duda'); }
    if (r.pr5 === 'Sí, activamente') { s += 4; why.push('busca activamente'); }
    else if (r.pr5 === 'Sí, de forma pasiva') { s += 2; why.push('busca pasivamente'); }
    if (r.pr2 === 'No') { s += 2; why.push('nadie habló de su futuro'); }
    const tut = rowMean(r, ['tr1','tr2','tr3','tr4']);
    if (tut != null && tut < 3) { s += 2; why.push('tutoría floja'); }
    const perf = perfBy.get(key(r.Correo));
    if (perf != null && perf >= 4) { s += 2; why.push('alto desempeño'); }
    return { correo: r.Correo, dept: r.Departamento, s, why };
  }).filter((x) => x.s >= 4).sort((a, b) => b.s - a.s);

  if (riesgo.length) {
    H.push(secLabel('Riesgo de fuga', `${riesgo.length} becario${riesgo.length !== 1 ? 's' : ''} a los 12 meses, por prioridad`));
    H.push(card('Requieren conversación',
      'Puntuación ponderada, no un filtro binario. <b>Pesa más querer irse y estar buscando</b>; el alto desempeño sube la prioridad porque es a quien más caro sale perder.',
      `<div class="risk-list">${riesgo.map((r) => `<div class="risk-item">
        <span class="risk-who">${esc(quien(r.correo))} <small style="color:var(--ink-muted);font-weight:400">${esc(r.correo)}</small> · ${esc(r.dept || '—')}</span>
        <span><span class="risk-why">${esc(r.why.join(' · '))}</span>
        <span class="risk-score"> ${r.s}</span></span></div>`).join('')}</div>`));
  }

  // ── 15/16 · Salidas ──────────────────────────────────────────────────
  const motivos = MOTIVOS_SALIDA.map((m) => ({ name: m, v: becSal.filter((r) => r.sa1 === m).length }))
    .filter((d) => d.v).sort((a, b) => b.v - a.v);
  if (motivos.length) {
    const max = Math.max(...motivos.map((d) => d.v));
    H.push(secLabel('Salidas', `${becSal.length} registrada${becSal.length !== 1 ? 's' : ''}`));
    H.push(card('Motivos de salida', 'Lo único que explica el <b>porqué</b> de las bajas',
      `<div class="bars">${motivos.map((d) => `<div class="bar-row">
        <span class="bar-name">${esc(d.name)}</span>
        <div class="bar-lane">${bar(d.v, max, 'bar-fill--2', d.name)}
          <span class="bar-value">${d.v}</span></div></div>`).join('')}</div>` +
      tbl('t-mot', 'Motivos de salida', ['Motivo','Respuestas'], motivos.map((d) => [esc(d.name), d.v])), 't-mot'));
  }

  // ── Medias generales ─────────────────────────────────────────────────
  if (B.length) {
    H.push(secLabel('Becarios', `${B.length} respuesta${B.length !== 1 ? 's' : ''}`));
    H.push(`<div class="kpis">
      ${DIMS_BEC.map((d) => kpi(d.name, num(mean(B, d.fs), '/5'))).join('')}
      ${kpi('Satisfacción', num(mean(B, ['gl1']), '/10'))}
      ${kpi('eNPS global', '', '', 'accent', nps(B, 'gl2') == null ? null : signed(nps(B, 'gl2')))}
    </div>`);
  }
  if (T.length) {
    H.push(`<div class="kpis" style="margin-top:11px">
      ${kpi('Desempeño medio', num(mean(T, ['d1','d2','d3','d4','d5','d6']), '/5'), 'según tutores')}
      ${kpi('Competencias', num(mean(T, ['c1','c2','c3','c4','c5','c6']), '/5'))}
      ${kpi('Vs. perfil ideal', num(mean(T, ['i4']), '/5'), 'i4')}
      ${kpi('Incorporarían', pctv(share(T, 'i1', INCORPORARIA.slice(0, 2))).replace(/^\d+/, ''), 'Sí o con desarrollo', 'good', String(share(T, 'i1', INCORPORARIA.slice(0, 2))))}
    </div>`);
  }

  // ── Por departamento ─────────────────────────────────────────────────
  const byDept = AREAS.map((d) => ({ name: d,
    a: mean(T.filter((r) => canon(r.Area) === canon(d)), ['d1','d2','d3','d4','d5','d6']),
    b: mean(B.filter((r) => canon(r.Area) === canon(d)), ['ap1','ap2','tr1','tr2']),
  })).filter((d) => d.a != null || d.b != null);
  if (byDept.length) {
    const S1 = 'Desempeño (tutor)', S2 = 'Experiencia (becario)';
    H.push(card('Comparativa por departamento', 'Escala 1–5 · solo departamentos con respuestas',
      `<div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:var(--series-1)"></span>${S1}</span>
        <span class="legend-item"><span class="legend-swatch" style="background:var(--series-2)"></span>${S2}</span></div>
      <div class="bars">${byDept.map((d) => `<div class="bar-row">
        <span class="bar-name">${esc(d.name)}</span>
        <div><div class="bar-lane">${bar(d.a, 5, 'bar-fill--1', `${d.name} — ${S1}`)}
            <span class="bar-value">${d.a?.toFixed(1) ?? '—'}</span></div>
          <div class="bar-lane">${bar(d.b, 5, 'bar-fill--2', `${d.name} — ${S2}`)}
            <span class="bar-value">${d.b?.toFixed(1) ?? '—'}</span></div></div></div>`).join('')}</div>
      <div class="bar-axis"><span>0</span><span>5</span></div>` +
      tbl('t-dept', 'Comparativa por área — escala 1–5', ['Área', S1, S2],
        byDept.map((d) => [esc(d.name), d.a?.toFixed(1) ?? '—', d.b?.toFixed(1) ?? '—'])), 't-dept'));
  }

  // ── 17 · Cobertura ───────────────────────────────────────────────────
  H.push(card('Cobertura del dato',
    'Cuántas respuestas sostienen cada hito. <b>Sin esto, todo lo de arriba miente:</b> una media de 3 respuestas no es una media.',
    `<div class="bars">${HITO_KEYS.map((h, i) => {
      const nb = scoped((r) => r._bec && r._h === h).length;
      const nt = scoped((r) => !r._bec && r._h === h).length;
      const mx = Math.max(1, ...HITO_KEYS.map((x) => scoped((r) => r._h === x).length));
      return `<div class="bar-row"><span class="bar-name">${esc(HITOS[h].label)}</span>
        <div><div class="bar-lane">${bar(nb, mx, 'bar-fill--h' + (i + 1), `${HITOS[h].label} — becarios`)}
          <span class="bar-value">${nb} becarios</span></div>
          <div class="bar-lane">${bar(nt, mx, 'bar-fill--g', `${HITOS[h].label} — tutores`)}
          <span class="bar-value">${nt} tutores</span></div></div></div>`;
    }).join('')}</div>` +
    (ultima ? `<p class="card-note" style="margin:14px 0 0">Última respuesta: hace ${dias} día${dias !== 1 ? 's' : ''}.</p>` : '')));

  return { html: H.join(''), silencio };
}

$('#brand-home').addEventListener('click', renderLanding);
renderLanding();
</script>
